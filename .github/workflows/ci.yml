name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    name: Lint, typecheck, test coverage, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: API docs generation
        run: pnpm docs:api

      - name: Template validation
        run: |
          pnpm create:package -n test-utils -t utils -d "Test utils"
          pnpm create:package -n test-component -t component -d "Test component"
          pnpm create:package -n test-react -t react -d "Test react"
          pnpm create:package -n test-vue -t vue -d "Test vue"
          pnpm create:package -n test-cesium -t cesium -d "Test cesium"
          pnpm install --no-frozen-lockfile
          pnpm build
